# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

# БЛОК CI
name: Java CI/CD with Gradle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read

    # Поднимаем изолированный тест-контейнер Postgres 18
    services:
      postgres_db:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: taro_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5431:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d taro_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

        # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
        # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        # Запускаем сборку и JUnit-тесты.
      - name: Build with Gradle Wrapper and Run Tests
        run: ./gradlew build

  # БЛОК CD
  deploy:
    runs-on: ubuntu-latest
    needs: build # Запускается ТОЛЬКО если этап CI завершился успехом (зеленая галочка)
    if: github.ref == 'refs/heads/master' # Деплой происходит ТОЛЬКО при слиянии в ветку master

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/TARO 
            git pull origin master
            docker compose up --build -d --remove-orphans
